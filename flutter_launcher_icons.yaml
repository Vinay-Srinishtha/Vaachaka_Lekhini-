flutter_launcher_icons:
  # Android
  android: true
  image_path_android: "assets/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#E8F0F8"
  adaptive_icon_foreground: "assets/app_icon.png"

  # iOS
  ios: true
  image_path_ios: "assets/app_icon.png"
  remove_alpha_ios: true

  # Web
  web:
    generate: true
    image_path: "assets/app_icon.png"
    background_color: "#E8700A"
    theme_color: "#E8700A"
