name: vachika_lekhini
description: "Koti Vachika Lekhini (KVL) — spiritual practice app: voice chant counter, handwriting practice, programs, rewards."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0
  flutter: ">=3.41.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # --- State & routing ---
  flutter_riverpod: ^3.3.1
  go_router: ^17.2.3

  # --- Design system ---
  google_fonts: ^8.1.0
  flex_color_scheme: ^8.4.0
  flutter_svg: ^2.3.0
  cached_network_image: ^3.4.1

  # --- Data classes / JSON ---
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0

  # --- Storage ---
  drift: ^2.33.0
  sqlite3_flutter_libs: ^0.5.27
  hive_ce: ^2.19.3
  hive_ce_flutter: ^2.3.4
  path_provider: ^2.1.5
  path: ^1.9.1

  # --- Voice (kept from prototype) ---
  vosk_flutter_2: ^1.0.5
  record: ^6.2.0

  # --- Handwriting ---
  signature: ^6.3.0
  image_picker: ^1.2.2
  camera: ^0.12.0+1

  # --- Notifications, share, permissions ---
  flutter_local_notifications: ^21.0.0
  share_plus: ^13.1.0
  permission_handler: ^11.4.0       # pinned: vosk_flutter_2 transitive cap
  archive: ^3.6.1                   # pinned: vosk_flutter_2 transitive cap

  # --- Utilities ---
  intl: ^0.20.2
  uuid: ^4.5.3
  equatable: ^2.0.8
  collection: ^1.19.1
  characters: ^1.4.1
  cupertino_icons: ^1.0.8
  dio: ^5.9.2
  flutter_secure_storage: ^10.3.0
  connectivity_plus: ^7.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Codegen
  build_runner: ^2.4.13
  drift_dev: ^2.33.0
  freezed: ^3.2.5
  json_serializable: ^6.13.2
  # riverpod_generator / riverpod_lint / custom_lint deferred:
  # their analyzer ^9 constraint conflicts with drift_dev's analyzer ^10.
  # Plain Riverpod 3 (Provider/Notifier classes) works without codegen.

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/models/vosk-model-small-hi-0.22.zip
    - assets/mantras/
